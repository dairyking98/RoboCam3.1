name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install lightweight deps only — PySide6 and av are GUI/media libs
          # that are not needed for the hardware-free test suite.
          pip install pyserial numpy opencv-python requests pillow
          pip install pytest pytest-cov
          pip install -e . --no-deps

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=robocam --cov-report=term-missing
